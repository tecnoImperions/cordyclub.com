<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Distribuidores – CordyClub Bolivia</title>
<meta name="theme-color" content="#1a5c35"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<style>
:root{
  --verde:#1a5c35;
  --verde2:#2E8B57;
  --wa:#25d366;
  --gold:#DAA520;
  --bg:#f5fdf8;
  --text:#1a2e22;
  --muted:#6b8c78;
  --card:#ffffff;
  --border:#d4ede0;
  --tr:all .2s ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
a{text-decoration:none;color:inherit;}
button{cursor:pointer;border:none;background:none;font-family:'Sora',sans-serif;}

/* NAVBAR */
.navbar{
  position:fixed;top:0;left:0;right:0;z-index:200;height:64px;
  background:linear-gradient(135deg,var(--verde) 0%,var(--verde2) 100%);
  display:flex;align-items:center;padding:0 20px;gap:12px;
  box-shadow:0 2px 16px rgba(26,92,53,.3);
}
.nav-brand{flex:1;display:flex;align-items:center;gap:8px;color:#fff;font-weight:800;font-size:1.1rem;}
.nav-back{
  display:flex;align-items:center;gap:5px;color:rgba(255,255,255,.85);
  font-size:.85rem;font-weight:600;padding:8px 14px;border-radius:10px;
  border:1.5px solid rgba(255,255,255,.25);transition:var(--tr);
}
.nav-back:hover{color:#fff;background:rgba(255,255,255,.15);}

/* HERO */
.hero{
  margin-top:64px;
  background:linear-gradient(135deg,var(--verde) 0%,var(--verde2) 100%);
  padding:28px 20px 32px;
}
.hero-inner{max-width:600px;margin:0 auto;}
.hero h1{font-size:1.7rem;font-weight:800;color:#fff;margin-bottom:6px;}
.hero h1 em{color:#86efac;font-style:normal;}
.hero-sub{font-size:.95rem;color:rgba(255,255,255,.65);margin-bottom:20px;}

/* BUSCADOR */
.search-box{
  display:flex;align-items:center;
  background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.2);
  border-radius:14px;overflow:hidden;transition:var(--tr);
}
.search-box:focus-within{background:rgba(255,255,255,.18);border-color:rgba(134,239,172,.5);}
.search-box i{padding:0 15px;color:rgba(255,255,255,.5);font-size:1.1rem;flex-shrink:0;}
.search-box input{
  flex:1;border:none;background:transparent;color:#fff;
  font-family:'Sora',sans-serif;font-size:1rem;padding:15px 0;outline:none;
}
.search-box input::placeholder{color:rgba(255,255,255,.35);}

/* FILTROS CIUDAD */
.filters{
  position:sticky;top:64px;z-index:150;
  background:var(--card);border-bottom:2px solid var(--border);
}
.filters-in{
  max-width:600px;margin:0 auto;padding:12px 20px;
  display:flex;align-items:center;gap:10px;
  overflow-x:auto;scrollbar-width:none;
}
.filters-in::-webkit-scrollbar{display:none;}
.flt-lbl{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);white-space:nowrap;flex-shrink:0;}
.ftab{
  flex-shrink:0;padding:9px 18px;border-radius:99px;
  font-size:.9rem;font-weight:700;border:2px solid var(--border);
  background:#fff;color:var(--muted);cursor:pointer;transition:var(--tr);white-space:nowrap;
}
.ftab:hover{border-color:var(--verde2);color:var(--verde2);}
.ftab.active{background:var(--verde2);color:#fff;border-color:var(--verde2);}
.ftab .fc{font-size:.72rem;font-weight:700;padding:1px 6px;border-radius:8px;margin-left:4px;}
.ftab.active .fc{background:rgba(255,255,255,.2);color:#fff;}
.ftab:not(.active) .fc{background:#e6f7ee;color:var(--verde2);}

/* MAIN */
.wrap{max-width:600px;margin:0 auto;padding:20px 16px 100px;}

/* LISTA */
.dist-list{display:flex;flex-direction:column;gap:14px;}

/* CARD */
.dist-card{
  background:var(--card);border:2px solid var(--border);
  border-radius:18px;overflow:hidden;
  display:flex;align-items:center;
  transition:var(--tr);cursor:pointer;
  box-shadow:0 2px 12px rgba(46,139,87,.08);
  animation:fadeIn .25s ease both;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.dist-card:hover{border-color:var(--verde2);box-shadow:0 6px 24px rgba(46,139,87,.14);}
.dist-card.is-fav{border-color:var(--verde2);border-width:2.5px;}

/* Barra lateral */
.dc-bar{width:6px;flex-shrink:0;align-self:stretch;}

/* Avatar */
.dc-av{
  width:62px;height:62px;border-radius:14px;flex-shrink:0;
  margin:14px 0 14px 14px;
  background:linear-gradient(135deg,var(--verde2),#3aac6e);
  display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;font-weight:800;color:#fff;
  overflow:hidden;border:2px solid var(--border);
}
.dc-av img{width:100%;height:100%;object-fit:cover;}

/* Info */
.dc-body{flex:1;padding:14px 12px 14px 14px;min-width:0;}
.dc-name{
  font-size:1rem;font-weight:800;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-bottom:3px;display:flex;align-items:center;gap:6px;
}
.fav-tag{
  display:inline-flex;align-items:center;gap:3px;
  background:#fff0f0;color:#c53030;border:1.5px solid #f9b8b8;
  font-size:.6rem;font-weight:700;padding:2px 7px;border-radius:6px;flex-shrink:0;
}
.dc-ciudad{
  font-size:.85rem;color:var(--muted);
  display:flex;align-items:center;gap:4px;margin-bottom:8px;
}
.dc-rating{display:flex;align-items:center;gap:5px;}
.stars-wrap{display:flex;gap:1px;}
.star{font-size:.8rem;color:#d1d5db;}
.star.on{color:var(--gold);}
.rv-num{font-size:.9rem;font-weight:700;color:var(--gold);}
.rv-cnt{font-size:.8rem;color:var(--muted);}
.sin-rv{font-size:.78rem;color:var(--muted);}

/* Acciones */
.dc-acts{display:flex;flex-direction:column;align-items:center;gap:8px;padding:14px 14px 14px 6px;flex-shrink:0;}
.act-wa{
  display:flex;align-items:center;justify-content:center;
  background:var(--wa);color:#fff;
  width:36px;height:36px;border-radius:11px;
  transition:var(--tr);flex-shrink:0;
}
.act-wa:hover{background:#1aad50;}
.act-wa i{font-size:1.15rem;}
.act-fav{
  width:36px;height:36px;border-radius:10px;
  background:#f0f9f4;color:var(--muted);
  border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;transition:var(--tr);
}
.act-fav:hover{background:#fde8e8;color:#e53e3e;border-color:#f9b8b8;}
.act-fav.on{background:#fff0f0;color:#e53e3e;border-color:#f9b8b8;}

/* EMPTY */
.empty-st{text-align:center;padding:50px 20px;color:var(--muted);}
.empty-st i{font-size:2.5rem;color:var(--border);display:block;margin-bottom:12px;}
.empty-st p{font-size:.95rem;}

/* SKELETON */
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.skel{
  background:linear-gradient(90deg,#eaf6f0 25%,#d8ede3 50%,#eaf6f0 75%);
  background-size:400px 100%;animation:shimmer 1.2s infinite;border-radius:8px;
}
.skel-card{
  background:var(--card);border:2px solid var(--border);border-radius:18px;
  padding:16px;display:flex;align-items:center;gap:14px;margin-bottom:14px;
}
.skel-av{width:62px;height:62px;border-radius:14px;flex-shrink:0;}
.sk-lines{flex:1;}
.sk-l{height:13px;margin-bottom:9px;}

/* BARRA INFERIOR MÓVIL */
.mob-bar{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:rgba(255,255,255,.97);border-top:2px solid var(--border);
  padding:12px 20px;padding-bottom:calc(12px + env(safe-area-inset-bottom,0));
  box-shadow:0 -4px 20px rgba(26,92,53,.1);backdrop-filter:blur(20px);
}
.mob-bar-in{display:flex;align-items:center;gap:12px;}
.mb-info{flex:1;}
.mb-info strong{display:block;font-size:.9rem;font-weight:800;color:var(--text);}
.mb-info span{font-size:.75rem;color:var(--muted);}
.mb-wa{
  display:flex;align-items:center;gap:6px;
  background:var(--wa);color:#fff;font-weight:700;font-size:.9rem;
  padding:13px 18px;border-radius:12px;white-space:nowrap;transition:var(--tr);
}
.mb-wa:hover{background:#1aad50;}
@media(max-width:600px){.mob-bar{display:block;}}

/* TOAST */
.toast-wrap{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);z-index:9000;pointer-events:none;}
.toast-item{
  background:var(--text);color:#fff;padding:10px 18px;border-radius:50px;
  font-size:.82rem;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.2);
  display:flex;align-items:center;gap:7px;
  opacity:0;transform:translateY(10px);transition:all .25s;white-space:nowrap;
}
.toast-item.show{opacity:1;transform:translateY(0);}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-brand">
    <i class="bi bi-leaf-fill"></i> CordyClub Bolivia
  </div>
  <a href="catalogo.html" class="nav-back"><i class="bi bi-grid-3x3-gap"></i> Catálogo</a>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-inner">
    <h1>Elige tu <em>distribuidor</em></h1>
    <p class="hero-sub">Encuentra al más cercano y contáctalo directo por WhatsApp.</p>
    <div class="search-box">
      <i class="bi bi-search"></i>
      <input type="text" id="heroSearch" placeholder="Buscar por nombre o ciudad..." oninput="filtrar()"/>
    </div>
  </div>
</section>

<!-- FILTROS CIUDAD -->
<div class="filters">
  <div class="filters-in">
    <span class="flt-lbl">Ciudad</span>
    <div id="ftabs" style="display:flex;gap:8px;">
      <div class="ftab active" data-c="" onclick="setCiudad('',this)">Todos <span class="fc" id="fcTodos">0</span></div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="wrap">

  <!-- SKELETONS -->
  <div id="skels">
    <div class="skel-card"><div class="skel skel-av"></div><div class="sk-lines"><div class="skel sk-l" style="width:55%"></div><div class="skel sk-l" style="width:35%;height:11px"></div><div class="skel sk-l" style="width:70%;height:11px;margin-bottom:0"></div></div></div>
    <div class="skel-card"><div class="skel skel-av"></div><div class="sk-lines"><div class="skel sk-l" style="width:50%"></div><div class="skel sk-l" style="width:30%;height:11px"></div><div class="skel sk-l" style="width:65%;height:11px;margin-bottom:0"></div></div></div>
    <div class="skel-card"><div class="skel skel-av"></div><div class="sk-lines"><div class="skel sk-l" style="width:60%"></div><div class="skel sk-l" style="width:38%;height:11px"></div><div class="skel sk-l" style="width:72%;height:11px;margin-bottom:0"></div></div></div>
  </div>

  <!-- LISTA -->
  <div class="dist-list" id="distList"></div>

</div>

<!-- BARRA INFERIOR MÓVIL (favorito activo) -->
<div class="mob-bar" id="mobBar" style="display:none;">
  <div class="mob-bar-in">
    <div class="mb-info">
      <strong id="mbNom">—</strong>
      <span>Tu distribuidor favorito</span>
    </div>
    <a class="mb-wa" id="mbWa" href="#" target="_blank">
      <i class="bi bi-whatsapp"></i> Contactar
    </a>
  </div>
</div>

<div class="toast-wrap"><div class="toast-item" id="toastEl"></div></div>

<script type="module">
const SB_URL   = 'https://iqloqrnaoxuldtinneqn.supabase.co';
const SB_KEY   = 'sb_publishable_fjYtclIYb_OeECjDf023Tw_DeeMCjXY';
const MASTER_WA= '59163488086';
const KEY_FAV  = 'cc_fav_dist';

let allDist = [];
let ciudadF = '';

/* ── FAVORITO ── */
const getFav = () => { try{return JSON.parse(localStorage.getItem(KEY_FAV))||null;}catch{return null;} };
const esFav  = id => { const f=getFav(); return f ? Number(f.id)===Number(id) : false; };
function saveFav(d){
  const f={id:d.id,nombre:d.nombre,wa:d.whatsapp_publico||d.whatsapp||MASTER_WA};
  localStorage.setItem(KEY_FAV,JSON.stringify(f));
  return f;
}

function waUrl(d){
  const wa  = d.whatsapp_publico||d.whatsapp||d.wa||MASTER_WA;
  const nom = (d.nombre||'').split(' ')[0];
  const msg = `Hola ${nom}! Vi tu perfil en CordyClub y me gustaría información sobre los productos.`;
  return `https://wa.me/${wa}?text=${encodeURIComponent(msg)}`;
}

function sincFavUI(){
  const fav = getFav();
  const mob  = document.getElementById('mobBar');
  if(fav){
    document.getElementById('mbNom').textContent = fav.nombre;
    document.getElementById('mbWa').href = waUrl(fav);
    mob.style.display = 'block';
  } else {
    mob.style.display = 'none';
  }
}

window.toggleFav = (ev, d) => {
  ev.stopPropagation();
  const id = Number(d.id);
  if(esFav(id)){
    localStorage.removeItem(KEY_FAV);
    toast('bi-heart','Removido de favoritos');
  } else {
    const ant = getFav();
    saveFav({...d, id});
    toast('bi-heart-fill', ant && Number(ant.id)!==id
      ? `Cambiaste a ${d.nombre.split(' ')[0]}`
      : `¡${d.nombre.split(' ')[0]} es tu favorito!`);
  }
  sincFavUI();
  render();
};

window.alContactar = (ev, d) => {
  ev.stopPropagation();
  if(!esFav(d.id)){ saveFav(d); sincFavUI(); render(); }
};

/* ── ESTRELLAS ── */
function stars(v){
  let h = '<div class="stars-wrap">';
  for(let i=1;i<=5;i++){
    if(v>=i)        h+=`<i class="bi bi-star-fill star on"></i>`;
    else if(v>=i-.5)h+=`<i class="bi bi-star-half star on"></i>`;
    else            h+=`<i class="bi bi-star star"></i>`;
  }
  return h+'</div>';
}

/* ── COLOR BARRA ── */
const COLORS={verde:'#2E8B57',teal:'#20B2AA',azul:'#3b82f6',morado:'#8b5cf6',naranja:'#f59e0b',rojo:'#ef4444',rosa:'#ec4899',gris:'#64748b'};
const barColor = d => COLORS[d.portada_color]||COLORS.verde;

/* ── RENDER CARD ── */
function mkCard(d, pos){
  const fav   = esFav(d.id);
  const inits = (d.nombre||'D').split(' ').map(x=>x[0]||'').join('').slice(0,2).toUpperCase();
  const foto  = d.avatar_url;
  const avH   = foto
    ? `<img src="${foto}" alt="${d.nombre}" onerror="this.style.display='none';this.parentElement.textContent='${inits}'">`
    : inits;

  const avg = d._avg || 0;
  const cnt = d._cnt || 0;

  const dStr = JSON.stringify(d).replace(/"/g,'&quot;');

  return `<div class="dist-card${fav?' is-fav':''}" onclick="irPerfil(${d.id})" style="animation-delay:${(pos%8)*.04}s">
    <div class="dc-bar" style="background:${barColor(d)};"></div>
    <div class="dc-av">${avH}</div>
    <div class="dc-body">
      <div class="dc-name">
        ${d.nombre}
        ${fav?`<span class="fav-tag"><i class="bi bi-heart-fill"></i> Mi favorito</span>`:''}
      </div>
      ${d.ciudad?`<div class="dc-ciudad"><i class="bi bi-geo-alt-fill" style="color:var(--verde2);font-size:.85rem;"></i>${d.ciudad}</div>`:''}
      <div class="dc-rating">
        ${cnt>0
          ? `${stars(avg)}<span class="rv-num">${avg}</span><span class="rv-cnt">(${cnt})</span>`
          : `<span class="sin-rv">Sin reseñas aún</span>`}
      </div>
    </div>
    <div class="dc-acts">
      <a class="act-wa" href="${waUrl(d)}" target="_blank" onclick="alContactar(event,${dStr})">
        <i class="bi bi-whatsapp"></i>
      </a>
      <button class="act-fav${fav?' on':''}" onclick="toggleFav(event,${dStr})" title="${fav?'Quitar favorito':'Mi favorito'}">
        <i class="bi bi-heart${fav?'-fill':''}"></i>
      </button>
    </div>
  </div>`;
}

/* ── RENDER LISTA ── */
function render(){
  const q = (document.getElementById('heroSearch')?.value||'').toLowerCase().trim();
  let items = [...allDist];

  if(ciudadF) items = items.filter(d=>(d.ciudad||'').toLowerCase()===ciudadF.toLowerCase());
  if(q)       items = items.filter(d=>
    (d.nombre||'').toLowerCase().includes(q)||
    (d.ciudad||'').toLowerCase().includes(q)||
    (d.usuario||'').toLowerCase().includes(q)
  );

  /* Orden: favorito arriba, luego por puntuación */
  items.sort((a,b)=>(b._avg||0)-(a._avg||0));
  items.sort((a,b)=>(esFav(b.id)?1:0)-(esFav(a.id)?1:0));

  const list = document.getElementById('distList');
  if(!items.length){
    list.innerHTML=`<div class="empty-st"><i class="bi bi-search"></i><p>Sin resultados para tu búsqueda</p></div>`;
  } else {
    list.innerHTML = items.map((d,i)=>mkCard(d,i)).join('');
  }
}

/* ── TABS CIUDAD ── */
function buildTabs(){
  const cnt={};
  allDist.forEach(d=>{ const c=d.ciudad||'—'; cnt[c]=(cnt[c]||0)+1; });
  document.getElementById('fcTodos').textContent = allDist.length;
  const wrap = document.getElementById('ftabs');
  Object.entries(cnt).sort((a,b)=>b[1]-a[1]).forEach(([c,n])=>{
    const t = document.createElement('div');
    t.className='ftab'; t.dataset.c=c;
    t.innerHTML=`${c} <span class="fc">${n}</span>`;
    t.onclick=()=>setCiudad(c,t);
    wrap.appendChild(t);
  });
}

window.setCiudad = (c, el) => {
  ciudadF = c;
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  render();
};

window.filtrar = render;

/* ── NAVEGACIÓN ── */
window.irPerfil = id => window.location.href=`distribuidor.html?id=${id}`;

/* ── TOAST ── */
let tt;
window.toast = (icon, text) => {
  const el = document.getElementById('toastEl');
  el.innerHTML=`<i class="bi ${icon}"></i> ${text}`;
  el.classList.add('show');
  clearTimeout(tt);
  tt=setTimeout(()=>el.classList.remove('show'),2500);
};

/* ── CARGAR DATOS ── */
async function cargar(){
  try{
    const {createClient} = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
    const sb = createClient(SB_URL, SB_KEY);

    const {data:dists, error} = await sb.from('distribuidores')
      .select('*').eq('activo',true).order('nombre');
    if(error) throw error;

    const {data:resenas} = await sb.from('resenas')
      .select('distribuidor_id,puntuacion').eq('aprobada',true);

    const rM={};
    (resenas||[]).forEach(r=>{
      if(!rM[r.distribuidor_id]) rM[r.distribuidor_id]={s:0,c:0};
      rM[r.distribuidor_id].s += r.puntuacion;
      rM[r.distribuidor_id].c++;
    });

    allDist = (dists||[]).map(d=>({
      ...d,
      _avg: rM[d.id] ? Math.round(rM[d.id].s/rM[d.id].c*10)/10 : 0,
      _cnt: rM[d.id]?.c||0,
    }));

    document.getElementById('skels').style.display='none';
    buildTabs();
    sincFavUI();
    render();

  } catch(e){
    console.error(e);
    document.getElementById('skels').style.display='none';
    document.getElementById('distList').innerHTML=
      `<div class="empty-st"><i class="bi bi-wifi-off"></i><p>Error de conexión. Recarga la página.</p></div>`;
  }
}

cargar();
</script>
</body>
</html>
